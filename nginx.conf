# ── Complete standalone nginx config (used with: nginx -c /home/vulnscope/nginx.conf) ──
# Required because we run as non-root and can't write to /etc/nginx/conf.d/

worker_processes  auto;

# Write pid and logs to locations the non-root user owns
pid        /tmp/nginx.pid;

error_log  /var/log/nginx/error.log warn;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log  /var/log/nginx/access.log;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile        on;
    keepalive_timeout  65;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json text/xml application/xml;
    gzip_min_length 1024;
    gzip_comp_level 6;

    # ── Write temp files to /tmp (tmpfs, always writable by any user) ────────
    client_body_temp_path  /tmp/nginx_client_temp;
    proxy_temp_path        /tmp/nginx_proxy_temp;
    fastcgi_temp_path      /tmp/nginx_fastcgi_temp;
    uwsgi_temp_path        /tmp/nginx_uwsgi_temp;
    scgi_temp_path         /tmp/nginx_scgi_temp;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # ── Hide nginx version ────────────────────────────────────────────────
        server_tokens off;

        # ── Security headers ──────────────────────────────────────────────────
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Content-Security-Policy "default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'" always;

        # ── Static file caching ───────────────────────────────────────────────
        location ~* \.(html|css|js)$ {
            expires 1h;
            add_header Cache-Control "public, must-revalidate";
        }

        # ── Main route ────────────────────────────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Block dotfile access ──────────────────────────────────────────────
        location ~ /\. {
            deny all;
            return 404;
        }
    }
}
