services:
  vulnscope:
    build:
      context: .
      dockerfile: Dockerfile
    image: vulnscope:latest
    container_name: vulnscope
    ports:
      - "8080:8080"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "com.vulnscope.version=2.5.0"
      - "com.vulnscope.description=Vulnerability Intelligence Platform"
